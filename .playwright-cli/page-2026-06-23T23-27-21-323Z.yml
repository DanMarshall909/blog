                - text: Melbourne
              - strong [ref=e65]: Description
              - text: Permanent role | Remote We’re looking for a Senior Full Stack Engineer who uses AI to help deliver better customer outcomes — not just to move faster, but to build the right things with greater quality, clarity and impact. You’ll work hands‑on across the stack — Azure and React, with backend development in C# (.NET Core) — and be involved from problem framing through to production. You’ll shape solutions, guide AI‑native delivery practices, make pragmatic technical decisions, and work directly with clients to turn business intent into usable software.
              - strong [ref=e66]: What you’ll be doing?
              - list [ref=e67]:
                - listitem [ref=e68]: Building and shipping full‑stack features end‑to‑end with a strong focus on customer outcomes.
                - listitem [ref=e69]: Designing and delivering cloud‑native solutions using Azure Functions and event‑driven patterns.
                - listitem [ref=e70]: Using AI to accelerate discovery, solution design, implementation and testing while keeping quality, security and maintainability front of mind.
                - listitem [ref=e71]: Creating reliable delivery flows with Azure DevOps and GitHub Actions, including strong validation and release discipline.
                - listitem [ref=e72]: Turning business needs into clear delivery slices, acceptance criteria and prioritised backlog items.
                - listitem [ref=e73]: Collaborating directly with clients and internal teams to validate ideas quickly and deliver meaningful value
              - strong [ref=e74]: You’ll thrive here if you…
              - list [ref=e75]:
                - listitem [ref=e76]: Senior engineering experience (6-8 + years) with a track record of delivering value, not just completing tickets.
                - listitem [ref=e77]: Experience in React.
                - listitem [ref=e78]: Backend experience with C# (.NET Core).
                - listitem [ref=e79]: Experience building and running systems on Azure.
                - listitem [ref=e80]: Strong judgement in using AI tools and agents — able to direct, validate and refine output to improve customer outcomes.
                - listitem [ref=e81]: Communicate clearly, influence with confidence, and stay calm under pressure.
                - listitem [ref=e82]: Can translate business needs into technical solutions that make sense.
              - text: We’re more interested in your thinking, your energy, and your impact than a perfect list of tech buzzwords.
              - strong [ref=e83]: Why you’ll love working at Kodez?
              - list [ref=e84]:
                - listitem [ref=e85]: Real career growth — opportunities to step into more senior roles as we scale
                - listitem [ref=e86]: Hybrid flexibility — work from home 2–3 days a week
                - listitem [ref=e87]: A supportive culture focused on wellbeing and psychological safety
                - listitem [ref=e88]: Competitive salary and meaningful perks
                - listitem [ref=e89]: Professional Development Days to invest in your craft
                - listitem [ref=e90]: Bonus leave — including your birthday off, plus options to purchase extra leave or take extended breaks
                - listitem [ref=e91]: Work that’s never boring — diverse projects, modern tech, great clients
                - listitem [ref=e92]: A team that values curiosity, kindness and continuous learning
              - text: At Kodez, we care about building software that matters — and about building teams that feel good to be part of. Interested - click apply and we will be in touch soon.
